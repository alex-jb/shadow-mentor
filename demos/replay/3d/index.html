<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" href="data:," /><!-- silence the file:// favicon fetch -->
<title>Shadow · The Audit Room</title>
<style>
  /* The scene is everything. The only DOM is a fatal-error div and a mode
     splash (design principle 7) — no HUD, no overlays, so SBS stereo is
     never broken. Pure black page so optical see-through stays transparent. */
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
  #splash {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font: 600 13px/1 ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 3px;
    color: #E8E8E8; opacity: 0; transition: opacity .35s ease; pointer-events: none;
    text-shadow: 0 0 1px rgba(0,0,0,.9);
  }
  #fatal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: none; max-width: 60ch; text-align: center;
    font: 500 14px/1.5 ui-monospace, Menlo, monospace; color: #FF4A4A;
    background: #000; padding: 18px 22px; border: 1px solid #FF4A4A; border-radius: 8px;
  }
  /* WebXR preflight panel — only appears in webxr mode (created by app.js). It is
     2D DOM so it shows in the flat browser view BEFORE you enter XR (diagnosable) and
     after you exit. It is not part of the SBS/AR view. */
  #xr-preflight {
    position: fixed; top: 10px; left: 10px; z-index: 20; width: 320px; max-width: 92vw;
    font: 12px/1.5 ui-monospace, Menlo, monospace; color: #cfd6e2;
    background: rgba(6,8,12,.92); border: 1px solid #26304a; border-radius: 10px; padding: 12px 14px;
  }
  #xr-preflight.min { width: auto; }
  #xr-preflight.min .pf-row, #xr-preflight.min .pf-manual, #xr-preflight.min #pf-copy, #xr-preflight.min #pf-dl { display: none; }
  #xr-preflight .pf-title { font-weight: 700; letter-spacing: 1.5px; color: #6ea8ff; margin-bottom: 8px; }
  #xr-preflight .pf-row { display: flex; justify-content: space-between; gap: 10px; padding: 2px 0; }
  #xr-preflight .pf-row b { font-weight: 700; }
  #xr-preflight .pf-row b.ok { color: #38d39f; }
  #xr-preflight .pf-row b.bad { color: #ff5a5a; }
  #xr-preflight .pf-row b.muted { color: #8b93a1; }
  #xr-preflight .pf-manual { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; color: #8b93a1; }
  #xr-preflight .pf-manual input[type=text], #xr-preflight .pf-manual input:not([type]) { width: 96px; background: #0f131b; border: 1px solid #26304a; color: #cfd6e2; border-radius: 4px; padding: 2px 5px; font: inherit; }
  #xr-preflight .pf-btns { margin-top: 10px; display: flex; gap: 6px; }
  #xr-preflight .pf-btns button { flex: 1; background: transparent; color: #6ea8ff; border: 1px solid #26304a; border-radius: 6px; padding: 5px; font: 11px ui-monospace, Menlo, monospace; cursor: pointer; }
  #xr-preflight .pf-btns #pf-min { flex: 0 0 28px; color: #8b93a1; }
</style>
</head>
<body>
  <div id="splash"></div>
  <div id="fatal"></div>
  <!-- One self-contained IIFE (three + app + real verifier + inlined demo
       data), built by build.mjs. Classic script so it loads from file://
       with no module CORS, no importmap, no server. -->
  <script src="./dist/audit-room.js"></script>
</body>
</html>
