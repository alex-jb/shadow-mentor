<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>Shadow · Scan → Analyze (cited overlay)</title>
<style>
  /* Medium-agnostic capture→extract→cited-overlay engine, side-panel first
     (per docs/strategy + the 2026 AR device analysis). The novel/defensible
     piece is the CITED OVERLAY: every verdict claim links back to the exact
     source region and highlights it — Shadow's traceability thesis as UX.
     This shell runs offline with a worked example; analyze() is the single
     seam to swap the mock for a real vision-LLM endpoint. */
  :root{
    --bg:#0b0d10; --ink:#e8ecf3; --dim:#8b95a8; --line:rgba(255,255,255,.09);
    --panel:#12161d; --ok:#3ddc97; --warn:#ffb020; --bad:#ff4a4a; --pill:#7dd3fc;
    --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace;
    --sans:-apple-system,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans)}
  #app{display:grid;grid-template-columns:1fr 380px;height:100vh}
  /* left: the "captured artifact" */
  #artifact{padding:28px 32px;overflow:auto;border-right:1px solid var(--line)}
  #artifact h1{font-size:15px;font-weight:600;letter-spacing:.3px;margin:0 0 4px}
  #artifact .sub{color:var(--dim);font-size:12px;margin-bottom:20px}
  .toggle{display:inline-flex;gap:6px;margin-bottom:18px}
  .toggle button{background:var(--panel);color:var(--dim);border:1px solid var(--line);
    border-radius:999px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--mono)}
  .toggle button.on{color:var(--ink);border-color:var(--pill)}
  table.doc{border-collapse:collapse;font-family:var(--mono);font-size:12.5px;width:100%;max-width:560px}
  table.doc td,table.doc th{border:1px solid var(--line);padding:7px 12px;text-align:left}
  table.doc th{color:var(--dim);font-weight:500;background:#0e1218}
  td.val{text-align:right}
  .cell{border-radius:3px;transition:background .2s,box-shadow .2s;padding:1px 3px}
  .cell.hot{background:rgba(125,211,252,.22);box-shadow:0 0 0 2px var(--pill)}
  /* chart artifact */
  #chartwrap{max-width:560px}
  svg{background:#0e1218;border:1px solid var(--line);border-radius:8px}
  .dot{transition:r .2s,fill .2s}
  .dot.hot{fill:var(--pill)}
  /* right: the cited analysis panel */
  #panel{background:var(--panel);padding:22px 22px;overflow:auto;display:flex;flex-direction:column;gap:16px}
  #panel .persona{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.4px}
  #verdict{font-size:16px;font-weight:600;line-height:1.35}
  #verdict .tag{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:999px;margin-right:8px;vertical-align:middle}
  .tag.ok{background:rgba(61,220,151,.15);color:var(--ok)}
  .tag.warn{background:rgba(255,176,32,.15);color:var(--warn)}
  .tag.bad{background:rgba(255,74,74,.15);color:var(--bad)}
  .claim{border-left:2px solid var(--line);padding:8px 0 8px 12px;font-size:13px;line-height:1.5}
  .claim .pill{display:inline-block;font-family:var(--mono);font-size:10.5px;color:var(--pill);
    border:1px solid rgba(125,211,252,.35);border-radius:999px;padding:1px 8px;margin-left:6px;cursor:pointer}
  .claim .pill:hover{background:rgba(125,211,252,.15)}
  #run{background:var(--pill);color:#04121b;border:0;border-radius:8px;
    padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--mono)}
  #run:disabled{opacity:.5;cursor:default}
  #seal{background:transparent;color:var(--ok);border:1px solid rgba(61,220,151,.4);border-radius:8px;
    padding:11px 14px;font-size:12px;cursor:pointer;font-family:var(--mono)}
  #sealed{font-family:var(--mono);font-size:11px;color:var(--ok);line-height:1.5}
  #source{color:var(--dim);font-size:11px;font-family:var(--mono)}
  .thinking{color:var(--dim);font-size:12px;font-family:var(--mono)}
</style>
</head>
<body>
<div id="app">
  <section id="artifact">
    <h1>Captured artifact</h1>
    <div class="sub" id="artifact-sub">A frozen frame — the thing you scanned. Click a citation pill on the right to highlight its source.</div>
    <div class="toggle">
      <button data-kind="statement" class="on">financial statement</button>
      <button data-kind="chart">data chart</button>
    </div>
    <div id="artifact-body"></div>
  </section>

  <aside id="panel">
    <div class="persona" id="persona">SHADOW · —</div>
    <div id="verdict" class="thinking">Press Analyze to run the council on the captured artifact.</div>
    <div id="claims"></div>
    <div id="source"></div>
    <div id="sealed"></div>
    <div style="margin-top:auto;display:flex;gap:8px">
      <button id="run" style="flex:1">Analyze</button>
      <button id="seal" hidden>Seal evidence</button>
    </div>
  </aside>
</div>

<script type="module">
// ── worked demo data (two verticals) ────────────────────────────────
const ARTIFACTS = {
  statement: {
    persona: "Bank / credit persona",
    render(el){
      // rows carry a data-cell id so a claim can highlight the source
      const rows = [
        ["applicant income (annual)", "$92,400", "income"],
        ["existing monthly debt", "$1,180", "debt"],
        ["requested loan", "$310,000", "loan"],
        ["property value", "$372,000", "value"],
        ["FICO", "706", "fico"],
        ["proposed monthly payment", "$1,980", "pmt"],
      ];
      el.innerHTML = `<table class="doc"><tr><th>line item</th><th>value</th></tr>` +
        rows.map(([k,v,id])=>`<tr><td>${k}</td><td class="val"><span class="cell" data-cell="${id}">${v}</span></td></tr>`).join("") +
        `</table>`;
    },
  },
  chart: {
    persona: "Data-science persona",
    render(el){
      // a scatter with one obvious outlier; dots carry data-cell ids
      const pts = [[40,120],[70,150],[95,175],[120,190],[150,205],[300,120]];
      const ids = ["p0","p1","p2","p3","p4","outlier"];
      const dots = pts.map(([x,y],i)=>`<circle class="dot" data-cell="${ids[i]}" cx="${x*1.4}" cy="${240-y}" r="6" fill="#8b95a8"/>`).join("");
      el.innerHTML = `<div id="chartwrap"><svg width="480" height="250" viewBox="0 0 480 250">
        <line x1="30" y1="220" x2="460" y2="220" stroke="#333"/><line x1="30" y1="20" x2="30" y2="220" stroke="#333"/>
        ${dots}
      </svg></div>`;
    },
  },
};

// ── the seam: swap this for a real vision-LLM endpoint ──────────────
// analyze(kind) -> { verdict:{text,tone}, claims:[{text, cell}] }
// Today it returns a worked mock so the UX runs offline. To wire a real
// model: POST the captured frame to a vision endpoint that returns the same
// shape; the citation `cell` must be an id present on the artifact.
async function analyze(kind){
  await new Promise(r=>setTimeout(r,700)); // "thinking" — a real call is ~1-3s
  if(kind==="statement") return {
    verdict:{ text:"DTI 0.41 — above the 0.36 policy ceiling; FICO clears the 700 floor.", tone:"warn" },
    claims:[
      {text:"DTI = (existing debt + proposed payment) ÷ monthly income = ($1,180 + $1,980) ÷ $7,700 = 0.41, over the 0.36 cap.", cell:"pmt"},
      {text:"Monthly income derived from $92,400 annual ÷ 12 = $7,700.", cell:"income"},
      {text:"LTV = $310,000 ÷ $372,000 = 0.83 — above the 0.80 preferred LTV.", cell:"loan"},
      {text:"FICO 706 is above the 700 hard floor, so the file is not a credit-eligibility block.", cell:"fico"},
    ],
  };
  return {
    verdict:{ text:"One clear outlier drives the trend; the fit is not robust to it.", tone:"bad" },
    claims:[
      {text:"Five points follow a rising trend; the sixth sits far off it (high x, low y).", cell:"outlier"},
      {text:"Removing the outlier changes the slope sign — the relationship is fragile, consistent with a leverage point.", cell:"outlier"},
      {text:"Recommend reporting the fit with and without the flagged point, and a confidence interval.", cell:"p4"},
    ],
  };
}

// ── attestation: seal the analysis into a verifiable Shadow evidence
// bundle (same format as attest-core / verify-browser.js — round-trip
// tested). Each analysis becomes a signed, tamper-evident record anyone can
// check offline with shadow-verify. This is what makes the scan surface a
// real Shadow record, not just a view: the moat is the verifiable evidence.
function canonicalize(v){if(v===null||typeof v!=="object")return JSON.stringify(v);if(Array.isArray(v))return "["+v.map(canonicalize).join(",")+"]";const k=Object.keys(v).sort();return "{"+k.map(k=>JSON.stringify(k)+":"+canonicalize(v[k])).join(",")+"}";}
function canonicalBytes(v){return new TextEncoder().encode(canonicalize(v));}
async function sha256Hex(b){const buf=await crypto.subtle.digest("SHA-256",b);return[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");}
function signedShape(e){const{payload_ref,...r}=e;return r;}
function hexToBytes(h){const o=new Uint8Array(h.length/2);for(let i=0;i<o.length;i++)o[i]=parseInt(h.substr(i*2,2),16);return o;}
function bytesToB64url(b){let s="";for(const x of b)s+=String.fromCharCode(x);return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
function abToPem(ab,l){const b=new Uint8Array(ab);let s="";for(const x of b)s+=String.fromCharCode(x);const b64=btoa(s).replace(/(.{64})/g,"$1\n");return `-----BEGIN ${l}-----\n${b64}\n-----END ${l}-----`;}
async function headerSeed(h){return sha256Hex(canonicalBytes({...h,session_ended_at_utc:null}));}
async function ownHash(e){return sha256Hex(canonicalBytes(signedShape(e)));}
async function sealAnalysis(kind,persona,res){
  const kp=await crypto.subtle.generateKey({name:"Ed25519"},true,["sign","verify"]);
  const pem=abToPem(await crypto.subtle.exportKey("spki",kp.publicKey),"PUBLIC KEY");
  const header={session_id:`scan-${kind}`,session_started_at_utc:"2026-07-16T00:00:00.000Z",session_ended_at_utc:null,agent:{name:"shadow-scan",version:"0.1",identity_ref:null},models:[{model_id:"worked-mock",provider:null,sampling_params_hash:null}],environment_fingerprint:{os:"browser",node_version:"n/a",hostname_hash:null},schema_versions:{bundle:1,attest_core:"2.0.0"}};
  const events=[];let prev=await headerSeed(header),seq=0;
  const push=async(t,a,p)=>{const ph=await sha256Hex(canonicalBytes(p));const ev={seq:seq++,ts_utc:header.session_started_at_utc,event_type:t,actor:a,payload_hash:ph,payload_ref:`sha256:${ph}`,prev_hash:prev,extensions:{}};events.push(ev);prev=await ownHash(ev);};
  await push("session_start","system",{kind,persona});
  await push("model_output","agent",{verdict:res.verdict.text,tone:res.verdict.tone});
  for(const c of res.claims)await push("tool_result","agent",{claim:c.text,source:c.cell});
  await push("session_end","system",{event_count:events.length+1});
  const hashes=[];for(const e of events)hashes.push(await ownHash(e));
  const concat=new Uint8Array(hashes.length*32);hashes.forEach((h,i)=>concat.set(hexToBytes(h),i*32));
  const batch_root=await sha256Hex(concat);
  const sig=await crypto.subtle.sign({name:"Ed25519"},kp.privateKey,hexToBytes(batch_root));
  const bundle={bundle_version:1,spec_version:"shadow-evidence/v1",header,events,batch_root,signatures:[{algorithm:"ed25519",key_id:"shadow-scan-demo",signature:bytesToB64url(new Uint8Array(sig)),signed_at_utc:header.session_started_at_utc}]};
  return {bundle,pem};
}
function download(name,text){const b=new Blob([text],{type:"application/octet-stream"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}

// ── UI wiring ───────────────────────────────────────────────────────
let kind = "statement";
let lastAnalysis = null;
const $ = s=>document.querySelector(s);
const body = $("#artifact-body");

function renderArtifact(){
  ARTIFACTS[kind].render(body);
  $("#persona").textContent = "SHADOW · " + ARTIFACTS[kind].persona;
  $("#verdict").className = "thinking";
  $("#verdict").textContent = "Press Analyze to run the council on the captured artifact.";
  $("#claims").innerHTML = ""; $("#source").textContent = "";
  $("#seal").hidden = true; $("#sealed").textContent = ""; lastAnalysis = null;
}
function highlight(cell, on){
  document.querySelectorAll(`[data-cell="${cell}"]`).forEach(el=>{
    el.classList.toggle(el.tagName==="circle"?"hot":"hot", on);
  });
}

document.querySelectorAll(".toggle button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".toggle button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); kind=b.dataset.kind; renderArtifact();
}));

$("#run").addEventListener("click", async ()=>{
  const run=$("#run"); run.disabled=true;
  $("#verdict").className="thinking"; $("#verdict").textContent="Running council…"; $("#claims").innerHTML="";
  const res = await analyze(kind);
  const tone = res.verdict.tone;
  $("#verdict").className="";
  $("#verdict").innerHTML = `<span class="tag ${tone}">${tone.toUpperCase()}</span>${res.verdict.text}`;
  $("#claims").innerHTML = res.claims.map((c,i)=>
    `<div class="claim">${c.text}<span class="pill" data-cell="${c.cell}">source ↩</span></div>`).join("");
  $("#source").textContent = "every claim links to its source region — click a pill";
  // citation pills highlight the exact source cell/point (the trust UX)
  document.querySelectorAll(".claim .pill").forEach(p=>{
    const cell=p.dataset.cell;
    p.addEventListener("mouseenter",()=>highlight(cell,true));
    p.addEventListener("mouseleave",()=>highlight(cell,false));
    p.addEventListener("click",()=>{ document.querySelectorAll(".cell.hot,.dot.hot").forEach(e=>e.classList.remove("hot")); highlight(cell,true); });
  });
  lastAnalysis = { kind, persona: ARTIFACTS[kind].persona, res };
  $("#seal").hidden = false;
  run.disabled=false;
});

$("#seal").addEventListener("click", async ()=>{
  if(!lastAnalysis) return;
  const seal=$("#seal"); seal.disabled=true; seal.textContent="Sealing…";
  const {bundle,pem} = await sealAnalysis(lastAnalysis.kind, lastAnalysis.persona, lastAnalysis.res);
  download(`shadow-analysis-${lastAnalysis.kind}.bundle.json`, JSON.stringify(bundle,null,2));
  download(`shadow-analysis-${lastAnalysis.kind}.public.pem`, pem);
  $("#sealed").innerHTML = `✓ sealed · ${bundle.events.length} events · Ed25519<br>verify offline: <code>shadow-verify bundle.json --public-key public.pem</code>`;
  seal.disabled=false; seal.textContent="Seal evidence";
});

renderArtifact();
window.__scanAnalyze = { analyze, setKind:k=>{kind=k;renderArtifact();} };
// auto-run for headless verification / a self-driving demo
if(location.search.includes("auto")) setTimeout(()=>{ $("#run").click(); setTimeout(()=>$("#seal").click(), 1000); }, 200);
</script>
</body>
</html>
