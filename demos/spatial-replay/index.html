function canonicalize(v){if(v===null||typeof v!=='object')return JSON.stringify(v);if(Array.isArray(v))return '['+v.map(canonicalize).join(',')+']';const k=Object.keys(v).sort();return '{'+k.map(k=>JSON.stringify(k)+':'+canonicalize(v[k])).join(',')+'}';}

async function verifyBundle(bundle, publicKeyPem) {

    const ev = bundle.events[i];

  const grad = g.createLinearGradient(0, 0, 0, c.height);
  grad.addColorStop(0, 'rgba(255,255,255,0.09)');
  grad.addColorStop(1, 'rgba(255,255,255,0.03)');
  g.fillStyle = grad; g.fillRect(0, 0, c.width, c.height);
  const pad = 28;
  const accent = tampered ? C.DANGER : (C.TYPE_COLOR[evt.event_type] ?? '#7dd3fc');

  g.fillStyle = tampered ? '#ff9090' : '#e8ecf3';
  g.font = `600 ${C.TITLE_FONT_PX}px -apple-system, "SF Pro Display", "PingFang SC", sans-serif`;
  g.textBaseline = 'top';
  g.fillText(evt.event_type, pad, pad);

  g.fillStyle = '#8b95a8';
  g.font = `500 ${C.META_FONT_PX}px -apple-system, sans-serif`;
  g.fillText(`${evt.actor}  ·  seq ${evt.seq}`, pad, pad + C.TITLE_FONT_PX + 8);

  const pillY = c.height - pad - 44;
  const pillX = pad;
  const pillH = 34;
  const shortHash = evt.payload_hash.slice(0, 12) + '…';
  g.font = `500 ${C.HASH_FONT_PX}px "SF Mono", "JetBrains Mono", Menlo, monospace`;
  const pillW = g.measureText(shortHash).width + 30;
  g.fillStyle = accent + '22';
  roundRect(g, pillX, pillY, pillW, pillH, 17); g.fill();
  g.strokeStyle = accent + '66';
  g.lineWidth = 1.5;
  roundRect(g, pillX, pillY, pillW, pillH, 17); g.stroke();
  g.fillStyle = accent;
  g.textBaseline = 'middle';
  g.fillText(shortHash, pillX + 15, pillY + pillH/2 + 1);

  g.beginPath();
  g.arc(c.width - pad - 8, pad + 12, 6, 0, Math.PI*2);
  g.fillStyle = accent; g.fill();

  if (tampered) {
    g.font = `500 ${C.META_FONT_PX}px "SF Mono", Menlo, monospace`;
    g.fillStyle = C.DANGER;
    g.textAlign = 'right'; g.textBaseline = 'top';
    g.fillText('⛓ ✗', c.width - pad - 20, pad + 12);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8; tex.needsUpdate = true;
  return tex;
}

function makeCard(evt, i, total) {
  const group = new THREE.Group();
  const shape = roundedRect(C.CARD_W, C.CARD_H, 0.10);
  const extrude = { depth: C.CARD_THICK, bevelEnabled: true, bevelSize: 0.015, bevelThickness: 0.02, bevelSegments: 3, curveSegments: 8 };
  const glassGeo = new THREE.ExtrudeGeometry(shape, extrude);
  glassGeo.center();
  const glassMat = new THREE.MeshPhysicalMaterial({
    color: C.GLASS_TINT, metalness: 0.05, roughness: 0.15,
    transmission: 0.72, thickness: 0.6, ior: 1.45,
    transparent: true, opacity: 0.85,
    clearcoat: 1.0, clearcoatRoughness: 0.05,
  });
  const glass = new THREE.Mesh(glassGeo, glassMat);
  group.add(glass);

  const faceGeo = new THREE.PlaneGeometry(C.CARD_W - 0.05, C.CARD_H - 0.05);
  const faceMat = new THREE.MeshBasicMaterial({ map: faceTexture(evt, false), transparent: true, depthWrite: false });
  const face = new THREE.Mesh(faceGeo, faceMat);
  face.position.z = C.CARD_THICK/2 + 0.005;
  group.add(face);

  const accentHex = C.TYPE_HEX[evt.event_type] ?? 0x7dd3fc;
  const edgeMat = new THREE.LineBasicMaterial({ color: accentHex, transparent: true, opacity: 0.6 });
  const edge = new THREE.LineSegments(new THREE.EdgesGeometry(faceGeo), edgeMat);
  edge.position.z = C.CARD_THICK/2 + 0.01;
  group.add(edge);

  const t = i / (total - 1);
  const angle = (t - 0.5) * C.CARD_ARC_SPAN;
  group.position.set(
    Math.sin(angle) * C.CARD_ARC_RADIUS,
    Math.sin(t * Math.PI * 3) * C.CARD_Y_JITTER + 0.4,
    -Math.cos(angle) * C.CARD_ARC_RADIUS + C.CARD_ARC_RADIUS - 0.5,
  );
  group.lookAt(0, group.position.y, 3);
  group.rotateX(-C.CARD_TILT * 0.4);

  group.userData = { evt, glassMat, edgeMat, faceMat, accentHex, isTampered: false, i };
  chainGroup.add(group);
  cards.push(group);
  return group;
}

// Chain links · quadratic bezier curves with green tint
const linkLines = [];
function buildScene() {
  cards.forEach(c => chainGroup.remove(c));
  cards.length = 0;
  linkLines.forEach(l => chainGroup.remove(l));
  linkLines.length = 0;
  const total = currentBundle.events.length;
  currentBundle.events.forEach((e, i) => makeCard(e, i, total));
  for (let i = 1; i < cards.length; i++) {
    const a = cards[i-1].position.clone();
    const b = cards[i].position.clone();
    const mid = a.clone().lerp(b, 0.5); mid.y -= 0.35; mid.z += 0.15;
    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
    const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(24));
    const mat = new THREE.LineBasicMaterial({ color: 0x4ade80, transparent: true, opacity: 0.5 });
    const line = new THREE.Line(geo, mat);
    chainGroup.add(line);
    linkLines.push(line);
  }
}
buildScene();

// ─── HUD ───────────────────────────────────────────────────────────
document.getElementById('badge-sid').textContent = `sid ${currentBundle.header.session_id.slice(0, 12)}…`;
document.getElementById('badge-count').textContent = `${currentBundle.events.length} events`;
document.getElementById('badge-agent').textContent = `agent ${currentBundle.header.agent.name}@${currentBundle.header.agent.version}`;

async function verifyAndPaint() {
  const r = await verifyBundle(currentBundle, PUBLIC_KEY_PEM);
  const dot = document.getElementById('status-dot');
  const v = document.getElementById('verdict');
  if (r.ok) {
    dot.className = 'dot';
    v.className = '';
    v.textContent = `signature valid · SELF_SIGNED · ${r.batchRoot.slice(0, 12)}…`;
    return null;
  } else {
    dot.className = 'dot red';
    v.className = 'red';
    v.textContent = `verify failed · ${r.error.reason}` + (r.error.seq !== null ? ` @ seq ${r.error.seq}` : '');
    return r.error;
  }
}

// ─── Interaction ───────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;

renderer.domElement.addEventListener('pointermove', (ev) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = cards.flatMap(c => c.children.filter(x => x.isMesh));
  const hit = raycaster.intersectObjects(meshes, false)[0];
  const card = hit ? cards.find(c => c.children.includes(hit.object)) : null;
  if (hovered && hovered !== card) hovered.userData.edgeMat.opacity = 0.6;
  if (card) { card.userData.edgeMat.opacity = 1.0; document.body.style.cursor = 'pointer'; }
  else { document.body.style.cursor = 'default'; }
  hovered = card;
});

renderer.domElement.addEventListener('click', (ev) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = cards.flatMap(c => c.children.filter(x => x.isMesh));
  const hit = raycaster.intersectObjects(meshes, false)[0];
  if (hit) {
    const card = cards.find(c => c.children.includes(hit.object));
    if (card) {
      const evt = card.userData.evt;
      const d = document.getElementById('ins-dot');
      d.style.background = C.TYPE_COLOR[evt.event_type] ?? '#7dd3fc';
      d.style.boxShadow = `0 0 6px ${C.TYPE_COLOR[evt.event_type] ?? '#7dd3fc'}`;
      document.getElementById('ins-title').textContent = evt.event_type;
      document.getElementById('ins-actor').textContent = `${evt.actor} · seq ${evt.seq}`;
      document.getElementById('ins-seq').textContent = `#${evt.seq}`;
      document.getElementById('ins-hash').textContent = evt.payload_hash;
      document.getElementById('ins-prev').textContent = evt.prev_hash;
      document.getElementById('inspector').style.display = 'block';
    }
  }
});

// ─── Tamper + Reset ────────────────────────────────────────────────
async function tamper() {
  document.getElementById('btn-tamper').disabled = true;
  const target = currentBundle.events[C.TAMPER_SEQ];
  target.payload_hash = target.payload_hash.slice(0, -1) + (target.payload_hash.slice(-1) === 'f' ? '0' : 'f');
  target.payload_ref = `sha256:${target.payload_hash}`;
  await verifyAndPaint();

  for (let i = C.TAMPER_SEQ; i < cards.length; i++) {
    setTimeout(() => {
      const card = cards[i];
      card.userData.isTampered = true;
      card.userData.edgeMat.color.setHex(C.DANGER_HEX);
      card.userData.edgeMat.opacity = 1.0;
      const oldTex = card.userData.faceMat.map;
      card.userData.faceMat.map = faceTexture(card.userData.evt, true);
      card.userData.faceMat.needsUpdate = true;
      if (oldTex) oldTex.dispose();
      if (i > 0 && linkLines[i - 1]) {
        linkLines[i - 1].material.color.setHex(C.DANGER_HEX);
        linkLines[i - 1].material.opacity = 0.85;
      }
    }, (i - C.TAMPER_SEQ) * C.CASCADE_MS_PER_CARD);
  }
  setTimeout(() => { document.getElementById('btn-reset').disabled = false; },
    (cards.length - C.TAMPER_SEQ) * C.CASCADE_MS_PER_CARD + 200);
}

async function reset() {
  document.getElementById('btn-reset').disabled = true;
  currentBundle = JSON.parse(JSON.stringify(ORIGINAL_BUNDLE));
  cards.forEach((card) => {
    card.userData.isTampered = false;
    card.userData.edgeMat.color.setHex(card.userData.accentHex);
    card.userData.edgeMat.opacity = 0.6;
    const oldTex = card.userData.faceMat.map;
    card.userData.faceMat.map = faceTexture(card.userData.evt, false);
    card.userData.faceMat.needsUpdate = true;
    if (oldTex) oldTex.dispose();
  });
  linkLines.forEach((l) => {
    l.material.color.setHex(0x4ade80);
    l.material.opacity = 0.5;
  });
  await verifyAndPaint();
  document.getElementById('btn-tamper').disabled = false;
}

document.getElementById('btn-tamper').addEventListener('click', tamper);
document.getElementById('btn-reset').addEventListener('click', reset);

(async () => {
  const err = await verifyAndPaint();
  if (!err) document.getElementById('btn-tamper').disabled = false;
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

let last = performance.now(), frames = 0, fpsAcc = 0;
function loop(t) {
  const dt = (t - last) / 1000; last = t;
  frames++; fpsAcc += dt;
  if (fpsAcc > 0.5) {
    document.getElementById('fps').textContent = `${Math.round(frames / fpsAcc)} fps`;
    frames = 0; fpsAcc = 0;
  }
  linkLines.forEach(l => {
    if (l.material.color.getHex() === 0x4ade80) {
      l.material.opacity = 0.35 + 0.1 * Math.sin(t * 0.0012);
    }
  });
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
