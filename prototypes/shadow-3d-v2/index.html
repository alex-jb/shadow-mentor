<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shadow 3D v2 — layout research prototype (isolated, not production)</title>
<style>
  :root{--bg:#0b0d10;--panel:#14181e;--bd:#232830;--text:#e6e6e6;--dim:#8a92a0;--ok:#4ade80;--bad:#ef4444;--warn:#fbbf24;--accent:#60a5fa;--mono:ui-monospace,Menlo,Consolas,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
  #bar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:rgba(11,13,16,.9);border-bottom:1px solid var(--bd)}
  #bar b{font-size:13px;margin-right:6px}
  button{font:inherit;cursor:pointer;border-radius:7px;border:1px solid var(--bd);background:var(--panel);color:var(--text);padding:5px 10px}
  button[aria-pressed="true"]{background:var(--accent);color:#0b0d10;border-color:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  #stage{position:fixed;inset:44px 340px 0 0}
  #side{position:fixed;top:44px;right:0;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--bd);overflow:auto;padding:12px}
  #side h2{font-size:13px;margin:0 0 8px}
  dl.v{display:grid;grid-template-columns:150px 1fr;gap:3px 10px;margin:0 0 14px;font-size:13px}
  dl.v dt{color:var(--dim)} dl.v dd{margin:0;font-family:var(--mono)}
  .s.ok{color:var(--ok)}.s.bad{color:var(--bad)}.s.warn{color:var(--warn)}.s.dim{color:var(--dim)}
  table.audit{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  table.audit th,table.audit td{text-align:left;padding:4px 5px;border-bottom:1px solid var(--bd)}
  table.audit td.st{font-family:var(--mono);white-space:nowrap}
  tr.focus{background:#172232}
  #detail{border-top:1px solid var(--bd);margin-top:10px;padding-top:10px;font-size:13px}
  #detail .k{color:var(--dim)}
  .note{color:var(--dim);font-size:11px;margin-top:8px}
  #canv2d{display:none}
  body[data-mode2d="true"] #stage{display:none}
  body[data-mode2d="true"] #canv2d{display:block;position:fixed;inset:44px 340px 0 0;overflow:auto;padding:16px}
</style>
</head>
<body>
  <div id="bar">
    <b id="t-title">Shadow 3D v2</b>
    <span role="group" aria-label="layout">
      <button class="lay" data-l="arc" aria-pressed="true">Arc</button>
      <button class="lay" data-l="dag">DAG</button>
      <button class="lay" data-l="timeline">Timeline</button>
      <button class="lay" data-l="hybrid">Hybrid</button>
    </span>
    <button id="tamper" aria-pressed="false" data-i="tamper">Show tampered</button>
    <button id="stepb" data-i="stepb">◀ Step</button>
    <button id="stepf" data-i="stepf">Step ▶</button>
    <button id="recenter" data-i="recenter">Recenter</button>
    <button id="reset" data-i="reset">Reset</button>
    <button id="mode2d" aria-pressed="false" data-i="mode2d">2D Audit</button>
    <button id="rmotion" aria-pressed="false" data-i="rmotion">Reduced motion</button>
    <span role="group" aria-label="language">
      <button id="lang-en" aria-pressed="true">EN</button>
      <button id="lang-zh" aria-pressed="false">中文</button>
    </span>
  </div>
  <div id="stage"></div>
  <div id="canv2d" aria-label="2D audit fallback"></div>
  <aside id="side">
    <h2 id="t-ver">Verification (six independent checks)</h2>
    <dl class="v" id="ver"></dl>
    <h2 id="t-audit">Audit sequence</h2>
    <table class="audit"><thead><tr><th id="t-seq">seq</th><th id="t-node">node</th><th id="t-status">status</th></tr></thead><tbody id="atbody"></tbody></table>
    <div id="detail"></div>
    <p class="note" id="t-note">Isolated research prototype · same-origin only · not production · positions are hints, semantics are authoritative.</p>
  </aside>
  <script type="importmap">{ "imports": { "three": "./vendor/three.module.js" } }</script>
  <script type="module" src="./app.js"></script>
</body>
</html>
