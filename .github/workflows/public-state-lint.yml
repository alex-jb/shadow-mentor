# Public-state lint — verifies the PUBLIC README on raw.githubusercontent.com
# is clean of forbidden phrases, not just the local working tree.
#
# Motivation (2026-07-13): scripts/check-forbidden-phrases.mjs runs against
# the checked-out working tree. That protects against a bad phrase entering
# a commit but doesn't catch "local file is fine, public URL still has stale
# content" — which can happen if a rewrite lands partially or a branch
# other than main is what the public sees.
#
# This job runs AFTER push to main and greps the actual raw.githubusercontent.com
# content. Zero output = clean. Any output = red build + notification.
#
# The audit that triggered this workflow (Sunday 2026-07-13) turned out to
# be a false alarm — most of it was CDN cache. But the workflow itself is
# a durable prevention for the "local-clean, public-poisoned" failure mode.
name: public-state-lint

on:
  push:
    branches: [main]
  # Also allow manual invocation for one-off audits.
  workflow_dispatch:

jobs:
  grep-public-readmes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait 20 seconds for GitHub Pages / raw CDN to catch up
        run: sleep 20

      - name: Grep public English README for forbidden phrases
        run: |
          set -e
          URL="https://raw.githubusercontent.com/${{ github.repository }}/main/README.md?v=$(date +%s)"
          echo "Fetching: $URL"
          BODY=$(curl -sSL "$URL")
          # These are the exact phrases scripts/check-forbidden-phrases.mjs
          # enforces on the local tree. Kept in sync manually — if you
          # add a phrase there, add it here too.
          FORBIDDEN='SR 26-2 Tier|Bulletin 2024-09|13 days before Reg B|License: TBD|SR 11-7 compliant'
          if echo "$BODY" | grep -nE "$FORBIDDEN"; then
            echo ""
            echo "::error::Public README has forbidden phrases (see matches above)."
            echo "Fix in a follow-up commit + push. Local check-forbidden-phrases.mjs did not catch this because the public URL served a different content."
            exit 1
          fi
          echo "OK — English README clean."

      - name: Grep public zh-CN README for forbidden phrases
        run: |
          set -e
          URL="https://raw.githubusercontent.com/${{ github.repository }}/main/README.zh-CN.md?v=$(date +%s)"
          BODY=$(curl -sSL "$URL")
          # Trailing 排出 Tier / carve OUT of Tier still matches the pattern
          # because SR 26-2 doesn't use a Tier taxonomy — even a "carved
          # out of Tier X" phrasing is factually wrong.
          FORBIDDEN='SR 26-2 Tier|排出 Tier|Bulletin 2024-09|13 days|13 天完成定位|SR 11-7 compliant'
          if echo "$BODY" | grep -nE "$FORBIDDEN"; then
            echo ""
            echo "::error::Public zh-CN README has forbidden phrases (see matches above)."
            exit 1
          fi
          echo "OK — zh-CN README clean."
