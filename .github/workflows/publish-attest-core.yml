name: publish shadow-attest-core

# Publishes packages/attest-core/ to npm with provenance
# (Sigstore-signed build attestation). Triggers:
#   - Manual: workflow_dispatch (safer for the first publish)
#   - Automatic: push tag matching `attest-core-v*` (e.g. attest-core-v2.0.1)
#
# Requires the NPM_TOKEN secret to be set. See docs/NPM_PUBLISH.md.
#
# Design decisions:
#   - Tag prefix `attest-core-v*` is deliberately package-specific so the
#     top-level v3.0.0 launch tag does NOT trigger a publish. Publishing
#     is an intentional action, not a side effect of tagging the whole repo.
#   - id-token: write is required for provenance signing per Sigstore.
#   - Node 22 matches the main test workflow.
#   - Tests must pass on the checked-out ref before publish is allowed.
#     If npm test fails, publish does not run.
#   - Concurrency is limited to one publish at a time to avoid a race
#     between manual + tag triggers landing simultaneously.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (--dry-run flag on npm publish); no OTP needed"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      otp:
        description: "npm 6-digit OTP from authenticator; REQUIRED when dry_run=false. Granular access tokens require OTP per publish; classic Automation tokens (which bypass OTP) are being sunset per npm's 2026-07 policy."
        required: false
        default: ""
        type: string
  push:
    tags:
      # Tag-triggered publishes require a classic Automation token in
      # NPM_TOKEN because there is no way to interactively provide OTP at
      # tag time. If NPM_TOKEN is a granular token, tag publishes will
      # fail with EOTP; use workflow_dispatch with the otp input instead.
      - "attest-core-v*"

concurrency:
  group: publish-attest-core
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # provenance signing

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Full test suite (safety gate)
        run: npm test

      - name: Forbidden-phrases lint (safety gate)
        run: node scripts/check-forbidden-phrases.mjs

      - name: Verify package.json coherence
        working-directory: packages/attest-core
        run: |
          echo "Package: $(node -p 'require(\"./package.json\").name')@$(node -p 'require(\"./package.json\").version')"
          echo "Files array:"
          node -p 'require("./package.json").files.join("\n")'
          echo ""
          echo "Confirming every file in files[] actually exists on disk:"
          for f in $(node -p 'require("./package.json").files.join(" ")'); do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"; exit 1
            else
              echo "  OK: $f"
            fi
          done

      - name: Validate OTP presence for real publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false'
        run: |
          if [ -z "${{ inputs.otp }}" ]; then
            echo "::error::dry_run=false requires the otp input (6-digit code from your authenticator)."
            echo "::error::Fire again with: gh workflow run publish-attest-core.yml -F dry_run=false -F otp=NNNNNN"
            exit 1
          fi
          if ! [[ "${{ inputs.otp }}" =~ ^[0-9]{6}$ ]]; then
            echo "::error::otp must be exactly 6 digits, got '${{ inputs.otp }}'"
            exit 1
          fi

      - name: npm publish --provenance
        working-directory: packages/attest-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ inputs.otp }}
        run: |
          # dry_run=true: no OTP, no upload; verifies packaging + files[].
          # dry_run=false: --otp forwards the 6-digit code from the workflow
          # input to npm registry. TOTP codes are 30-second windows; npm
          # accepts the previous window too (~60s total). Time from workflow
          # queue to this step is ~40-50s, so fire with a FRESH code.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN — pack only, no upload"
            npm publish --provenance --access public --dry-run
          elif [ -n "$NPM_OTP" ]; then
            npm publish --provenance --access public --otp="$NPM_OTP"
          else
            # Tag-trigger path (no OTP available). Requires an Automation
            # token in NPM_TOKEN; will EOTP-fail on granular tokens.
            npm publish --provenance --access public
          fi

      - name: Verify published tarball includes anchors.js
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == 'false'
        working-directory: packages/attest-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Pull the freshly published tarball back and grep for anchors.js.
          # Guards against a future package.json edit that drops files[]
          # entries without a test noticing.
          NAME=$(node -p 'require("./package.json").name')
          VERSION=$(node -p 'require("./package.json").version')
          echo "Verifying $NAME@$VERSION tarball contents..."
          npm view "$NAME@$VERSION" dist.tarball | xargs -I {} curl -sSLo /tmp/pkg.tgz "{}"
          tar -tzf /tmp/pkg.tgz | grep -E 'package/anchors\.js$' || {
            echo "FAIL: anchors.js missing from published tarball"; exit 1
          }
          echo "OK: anchors.js present in published tarball"
