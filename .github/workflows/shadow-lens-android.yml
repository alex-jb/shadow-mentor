name: shadow-lens-android-aars
# Builds + unit-tests the Shadow Lens Android AARs (OCR, Voice/TTS) on a HOSTED GitHub runner —
# self-installs JDK + Android SDK (accepts licenses, installs platform/build-tools), caches Gradle,
# runs the JVM tests, assembles DEBUG + RELEASE AARs, computes SHA-256 for every AAR, and emits a
# machine-readable build report. Does NOT need UNITY_LICENSE (no Unity Editor — Unity compilation
# lives in shadow-lens-unity.yml).
on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/shadow-lens/unity/AndroidBridges/**'
      - '.github/workflows/shadow-lens-android.yml'
  pull_request:
    paths:
      - 'apps/shadow-lens/unity/AndroidBridges/**'
jobs:
  aars:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shadow-lens/unity/AndroidBridges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Install SDK platform + build-tools + accept licenses
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.9' }
      - name: Voice router unit test (pure JVM, no device)
        run: gradle :voice-aar:testDebugUnitTest --no-daemon --stacktrace
      - name: Assemble OCR + Voice AARs (debug + release)
        run: gradle :ocr-aar:assembleDebug :ocr-aar:assembleRelease :voice-aar:assembleDebug :voice-aar:assembleRelease --no-daemon --stacktrace
      - name: SHA-256 + machine-readable build report
        run: |
          set -e
          echo '{ "build": "shadow-lens-android-aars", "commit": "'"$GITHUB_SHA"'", "aars": [' > build-report.json
          first=1
          for f in $(find . -name '*.aar' -path '*/build/outputs/*' | sort); do
            sha=$(sha256sum "$f" | awk '{print $1}'); size=$(stat -c%s "$f")
            [ $first -eq 0 ] && echo ',' >> build-report.json; first=0
            printf '{ "path": "%s", "sha256": "%s", "bytes": %s }' "$f" "$sha" "$size" >> build-report.json
          done
          echo '] }' >> build-report.json
          echo "=== build report ==="; cat build-report.json
          test $first -eq 0 || { echo "no AAR produced"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: shadow-lens-aars
          path: |
            apps/shadow-lens/unity/AndroidBridges/**/build/outputs/aar/*.aar
            apps/shadow-lens/unity/AndroidBridges/build-report.json
          if-no-files-found: error   # a green run MUST produce artifacts, or it fails honestly
