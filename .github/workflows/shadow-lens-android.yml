name: shadow-lens-android-aars
# Builds + unit-tests the Shadow Lens Android AARs (OCR, voice). NOT run on the dev host
# (no JDK/Android SDK). Manual dispatch on a runner that has the Android SDK.
# The voice AAR ships a pure JVM test (command router) that runs with no device.
on:
  workflow_dispatch:
jobs:
  aars:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shadow-lens/unity/AndroidBridges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Voice router unit test (pure JVM, no device)
        run: gradle :voice-aar:testDebugUnitTest --no-daemon
      - name: Assemble OCR + Voice AARs
        run: gradle :ocr-aar:assembleRelease :voice-aar:assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with: { name: shadow-lens-aars, path: 'apps/shadow-lens/unity/AndroidBridges/**/build/outputs/aar/*.aar', if-no-files-found: ignore }
