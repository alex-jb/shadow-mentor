name: shadow-lens-android-aars
# Builds + tests the Shadow Lens Android AARs (OCR, voice). NOT run on the dev host
# (no JDK/Android SDK). Enable on a runner with Android SDK available.
on:
  workflow_dispatch:
jobs:
  aars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Gradle test + assemble (OCR AAR)
        working-directory: apps/shadow-lens/unity/AndroidBridges
        run: echo "TODO: add settings.gradle + gradle wrapper, then ./gradlew :ocr-aar:test :ocr-aar:assembleRelease"
      - uses: actions/upload-artifact@v4
        with: { name: shadow-lens-aars, path: 'apps/shadow-lens/unity/AndroidBridges/**/build/outputs/aar/*.aar', if-no-files-found: ignore }
