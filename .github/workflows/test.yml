name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # v2.0.0-rc3 expanded the matrix to windows/macOS as an aspirational
  # cross-platform promise. Windows fails 13 pre-existing CLI/subprocess
  # tests (Unix shell semantics + file mode assumptions in bin/*.mjs) that
  # need to be ported before we can enable those matrix cells without
  # spamming failure notifications. Tracked as post-Wed hygiene work.
  # macOS is deferred alongside because the two share the CLI test surface.
  node:
    name: node test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # readme-stats needs `git tag` to enumerate release tag count.
          # Default checkout is shallow + tag-less.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test
      - name: README stats drift check
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/readme-stats.mjs --check
      - name: MCP tool-catalog drift check
        if: matrix.os == 'ubuntu-latest'
        run: npm run check:tools
      - name: Forbidden-phrases lint
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/check-forbidden-phrases.mjs
      # Verifies the committed dogfood bundle still passes shadow-verify.
      # Catches any refactor that silently breaks bundle-format compat with
      # bundles already in the wild. The Wed 2026-07-16 demo consumes this
      # exact bundle path, so a green CI here is a Wed-morning safety net.
      - name: Dogfood bundle verification
        if: matrix.os == 'ubuntu-latest'
        run: |
          node bin/shadow-verify.mjs \
            docs/dogfood-evidence/m2.1-first-success-13df92c7-2026-07-13.json \
            --public-key docs/dogfood-evidence/public-key-2026-07-13.pem

  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install shadow-verify
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run Python verifier tests (standalone runner)
        working-directory: python
        # test_verify.py uses a lightweight @test decorator + main() driver
        # so it runs without a pytest dep — see file docstring. Exit code
        # is non-zero on any failure per the file's main() implementation.
        run: python tests/test_verify.py
      # Cross-language contract enforcement: the same canonical attestation
      # payload verified by Node above must verify byte-for-byte by the
      # Python shadow-verify library across all supported Python versions.
      # This closes the Layer 2 "Canonical Attestation Regression" gap in
      # docs/CITATION_MAP.md section 0.
