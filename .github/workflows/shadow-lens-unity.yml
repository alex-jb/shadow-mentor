name: shadow-lens-unity-editmode
# Runs the PURE spatial-geometry EditMode tests (SpatialLayoutTests) in the Unity Test
# Runner. Not run on the dev host (no Unity/dotnet). Needs a UNITY_LICENSE secret
# (Alex-provided) — the geometry itself has no UnityEngine dependency, so these are fast,
# headset-free unit tests of the math that could be wrong.
on:
  workflow_dispatch:
jobs:
  editmode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: apps/shadow-lens/unity
          testMode: editmode
          artifactsPath: unity-test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: unity-editmode-results, path: unity-test-results, if-no-files-found: ignore }
