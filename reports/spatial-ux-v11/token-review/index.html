<!doctype html>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shadow — design token review</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,"PingFang SC",sans-serif; background:#0b0f16; color:#e8ecf2; }
  header { padding:16px 24px; background:#111826; border-bottom:1px solid #202a3a; position:sticky; top:0; }
  .badge { background:#961418; color:#fff; font-weight:800; padding:3px 10px; border-radius:4px; font-size:12px; }
  h1 { font-size:18px; margin:8px 0 0; } .sub { color:#9aa6b5; font-size:12px; }
  .controls { margin-top:10px; } select { background:#0f131b; color:#e8ecf2; border:1px solid #2a3550; border-radius:6px; padding:4px 8px; }
  main { padding:24px; } h2 { font-size:14px; letter-spacing:1px; text-transform:uppercase; color:#9aa6b5; border-bottom:1px solid #202a3a; padding-bottom:6px; margin-top:32px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; margin-top:12px; }
  .card { background:#111826; border:1px solid #202a3a; border-radius:10px; padding:12px; }
  .row1 { display:flex; align-items:center; gap:10px; }
  .swatch { width:34px; height:34px; border-radius:7px; border:2px solid rgba(255,255,255,.18); flex:0 0 auto; }
  .key { font-weight:800; } .zh { color:#c4cdd9; } .meta { color:#8a93a3; font-size:12px; margin-top:6px; }
  .glyphs { font-size:12px; color:#9aa6b5; margin-top:4px; }
  .grayscale main { filter: grayscale(1); }
  .conflicts { margin-top:8px; } .pair { display:inline-flex; gap:6px; align-items:center; background:#0f131b; border:1px solid #2a3550; border-radius:20px; padding:3px 10px; margin:3px; font-size:12px; }
  .dot { width:12px;height:12px;border-radius:50%; display:inline-block; }
</style>
<header>
  <span class="badge">DESIGN TOKEN REVIEW — NOT DEVICE VALIDATED</span>
  <h1>Shadow semantic tokens</h1>
  <div class="sub">canonical source: design/shadow-spatial-tokens.json (shadow-spatial-tokens/2) · offline · no CDN · generated by scripts/generate-token-review.mjs</div>
  <div class="controls">profile:
    <select id="profile" onchange="document.body.className=this.value">
      <option value="">DesktopDark (semantic identity)</option>
      <option value="grayscale">GrayscaleReview — must stay identifiable by shape + text</option>
    </select>
  </div>
</header>
<main>
  <section>
    <h2>Distinctness pairs — these must never look the same</h2>
    <div class="conflicts" id="conflicts"></div>
  </section>
  <div id="cats"></div>
</main>
<script>
  const DATA = {"status":{"DOWNSTREAM_AFFECTED":{"text":"AFFECTED DOWNSTREAM","text_zh":"受影响的后续","shape":"box","icon":"chain-arrow-dashed","color":"#8a92a0","a11y":"affected by an upstream failure — NOT an independent first failure","a11y_zh":"受上游失败影响——非独立首个失败"},"FAILED":{"text":"FAILED","text_zh":"验证失败","shape":"octahedron","icon":"cross","color":"#ef4444","a11y":"verification failed at this record","a11y_zh":"此记录验证失败"},"FIRST_FAILURE":{"text":"FIRST FAILURE","text_zh":"首个失败","shape":"octahedron","icon":"broken-seal-first","color":"#ef4444","a11y":"the FIRST point where verification fails","a11y_zh":"验证首次失败的点"},"NOT_CHECKED":{"text":"NOT CHECKED","text_zh":"未检查","shape":"box","icon":"question","color":"#fbbf24","a11y":"not checked in this pass","a11y_zh":"本次未检查"},"NOT_EVALUATED":{"text":"NOT EVALUATED","text_zh":"未评估","shape":"ring","icon":"dash","color":"#8a92a0","a11y":"not evaluated — distinct from failed","a11y_zh":"未评估——不等于失败"},"NOT_PRESENT":{"text":"NOT PRESENT","text_zh":"不存在","shape":"ring","icon":"empty","color":"#8a92a0","a11y":"not present in the bundle","a11y_zh":"证据包中不存在"},"NOT_VERIFIED":{"text":"NOT VERIFIED","text_zh":"未验证","shape":"box","icon":"dash","color":"#8a92a0","a11y":"not verified — downstream of a tamper; frozen","a11y_zh":"未验证——位于篡改点的下游;已冻结"},"TAMPERED":{"text":"TAMPERED","text_zh":"已篡改","shape":"octahedron","icon":"alert","color":"#ef4444","a11y":"tampered — the mutated node; verification fails here","a11y_zh":"已篡改——被改动的节点;验证在此失败"},"UNSUPPORTED":{"text":"UNSUPPORTED","text_zh":"不支持","shape":"box","icon":"block","color":"#fbbf24","a11y":"unsupported by this verifier","a11y_zh":"本验证器不支持"},"VERIFIED":{"text":"VERIFIED","text_zh":"已验证","shape":"icosahedron","icon":"check","color":"#4ade80","a11y":"verified — record matches the sealed evidence","a11y_zh":"已验证——该记录与封存证据一致;不代表决策正确"},"WARNING":{"text":"WARNING","text_zh":"警告","shape":"tetrahedron","icon":"warning","color":"#fbbf24","a11y":"a caution/quality flag — not a chain break","a11y_zh":"警示/质量标记——非链断裂"}},"governance":{"ABSTAINED":{"text":"ABSTAINED","text_zh":"弃权","shape":"ring","icon":"pause","color":"#8a92a0","a11y":"abstained from a stance","a11y_zh":"对该立场弃权"},"APPROVAL_NOT_PRESENT":{"text":"APPROVAL ABSENT","text_zh":"无审批","shape":"ring","icon":"stamp-empty","color":"#8a92a0","a11y":"no human approval is present","a11y_zh":"无人工审批"},"APPROVAL_PRESENT":{"text":"APPROVAL PRESENT","text_zh":"已审批","shape":"pill","icon":"stamp-signed","color":"#3b82f6","a11y":"explicit human approval (brand/stamp, NEVER verification green)","a11y_zh":"已获人工审批(品牌/印章色,绝不用验证绿)"},"HUMAN_REVIEW_RECORDED":{"text":"REVIEW RECORDED","text_zh":"已记录审核","shape":"box","icon":"review-doc","color":"#6b7280","a11y":"a human review was recorded — NOT the same as approval","a11y_zh":"已记录人工审核——不等于审批"},"REQUIRES_HUMAN_REVIEW":{"text":"REQUIRES REVIEW","text_zh":"需人工审核","shape":"diamond","icon":"human-diamond","color":"#3b82f6","a11y":"human review required (action)","a11y_zh":"需要人工审核(待处理)"}},"trust_posture":{"SELF_SIGNED":{"text":"SELF-SIGNED","text_zh":"自签名","shape":"box","icon":"key","color":"#fbbf24","a11y":"verifies against the supplied key; an operator holding it could re-sign altered history without an external anchor","a11y_zh":"对提供的密钥可验证;持钥运营者在无外部锚定时理论上可重签改动的历史"},"TIME_ANCHORED":{"text":"TIME-ANCHORED","text_zh":"时间锚定","shape":"box","icon":"anchor-check","color":"#4ade80","a11y":"verified external time anchor (e.g. RFC 3161 / Rekor)","a11y_zh":"已验证的外部时间锚定(如 RFC 3161 / Rekor)"},"TIME_ANCHORED_STRUCTURAL":{"text":"TIME-ANCHORED (STRUCTURAL)","text_zh":"结构化时间锚定","shape":"box","icon":"clock-outline","color":"#3b82f6","a11y":"structural timestamp present; not an external transparency anchor","a11y_zh":"存在结构化时间戳;非外部透明日志锚定"}},"tracking":{"INITIALIZING":{"text":"INITIALIZING","text_zh":"初始化中","shape":"ring","icon":"spinner","color":"#8a92a0","a11y":"tracking initializing","a11y_zh":"追踪初始化中"},"LIMITED":{"text":"TRACKING LIMITED","text_zh":"追踪受限","shape":"tetrahedron","icon":"warning","color":"#fbbf24","a11y":"tracking limited — safe session-relative layout","a11y_zh":"追踪受限——安全的会话相对布局"},"LOST":{"text":"TRACKING LOST","text_zh":"追踪丢失","shape":"octahedron","icon":"lost","color":"#ef4444","a11y":"tracking lost — story/selection/audit preserved; Recenter + 2D audit available","a11y_zh":"追踪丢失——故事/选择/审计保留;Recenter 与 2D 审计可用"},"RECOVERING":{"text":"RECOVERING","text_zh":"恢复中","shape":"tetrahedron","icon":"recover","color":"#fbbf24","a11y":"recovering — do not rebuild or replay stale voice","a11y_zh":"恢复中——不重建、不重放过期语音"},"SCANNING":{"text":"SCANNING FOR POSITION","text_zh":"定位扫描中","shape":"tetrahedron","icon":"scan","color":"#fbbf24","a11y":"scanning — hold still and slowly look around; core 3DoF review remains available. NOT lost.","a11y_zh":"扫描中——请稳住并缓慢环视;核心 3DoF 审阅仍可用。非丢失。"},"TRACKED_3DOF":{"text":"3DOF","text_zh":"3DoF 追踪","shape":"icosahedron","icon":"3dof","color":"#4ade80","a11y":"3DoF tracking active (orientation)","a11y_zh":"3DoF 追踪(姿态)"},"TRACKED_6DOF":{"text":"6DOF","text_zh":"6DoF 追踪","shape":"icosahedron","icon":"6dof","color":"#4ade80","a11y":"6DoF tracking active (position)","a11y_zh":"6DoF 追踪(位置)"}},"interaction":{"CONFIRM_REQUIRED":{"text":"CONFIRM REQUIRED","text_zh":"需确认","shape":"diamond","icon":"confirm","color":"#fbbf24","a11y":"confirmation required (regulated/destructive)","a11y_zh":"需确认(受监管/破坏性操作)"},"DEFAULT":{"text":"DEFAULT","text_zh":"默认","shape":"box","icon":"none","color":"#8a92a0","a11y":"default state","a11y_zh":"默认状态"},"DISABLED":{"text":"DISABLED","text_zh":"禁用","shape":"box","icon":"disabled","color":"#8a92a0","a11y":"disabled/inactive","a11y_zh":"禁用/未激活"},"FOCUSED":{"text":"FOCUSED","text_zh":"聚焦","shape":"box","icon":"focus-ring","color":"#3b82f6","a11y":"focused (hover/gaze) — highlight only, never selects or authorizes","a11y_zh":"聚焦(悬停/注视)——仅高亮,不选择、不授权"},"SELECTED":{"text":"SELECTED","text_zh":"已选择","shape":"box","icon":"selected","color":"#3b82f6","a11y":"selected — moved to current focus","a11y_zh":"已选择——进入当前焦点"}},"capability":{"AUTHORED":{"text":"AUTHORED","text_zh":"已编写","shape":"box","icon":"code","color":"#8a92a0","a11y":"source authored — not compiled","a11y_zh":"源代码已编写——未编译"},"BUILT":{"text":"BUILT","text_zh":"已构建","shape":"box","icon":"package","color":"#3b82f6","a11y":"artifact built — not installed on a device","a11y_zh":"产物已构建——未安装到设备"},"COMPILED":{"text":"COMPILED","text_zh":"已编译","shape":"box","icon":"gear","color":"#8a92a0","a11y":"compiles — not built to an artifact","a11y_zh":"可编译——未构建产物"},"DEVICE_VALIDATED":{"text":"DEVICE VALIDATED","text_zh":"真机已验证","shape":"box","icon":"device-check","color":"#4ade80","a11y":"validated on the physical device (only true with hardware evidence)","a11y_zh":"已在真机验证(仅在有硬件证据时为真)"},"INSTALLED":{"text":"INSTALLED","text_zh":"已安装","shape":"box","icon":"download","color":"#fbbf24","a11y":"installed on a device — not device-validated","a11y_zh":"已安装到设备——未真机验证"},"PRODUCTION_READY":{"text":"PRODUCTION READY","text_zh":"可生产","shape":"box","icon":"shield-check","color":"#4ade80","a11y":"production-ready (independent audit + device validation required)","a11y_zh":"可生产(需独立审计 + 真机验证)"}}};
  const PAIRS = [["status.VERIFIED","governance.APPROVAL_PRESENT"],["status.VERIFIED","governance.HUMAN_REVIEW_RECORDED"],["status.FAILED","status.DOWNSTREAM_AFFECTED"],["status.FIRST_FAILURE","status.DOWNSTREAM_AFFECTED"],["status.WARNING","tracking.SCANNING"],["tracking.SCANNING","tracking.LOST"],["status.NOT_EVALUATED","governance.APPROVAL_NOT_PRESENT"],["trust_posture.SELF_SIGNED","trust_posture.TIME_ANCHORED"],["interaction.FOCUSED","interaction.SELECTED"],["capability.BUILT","capability.DEVICE_VALIDATED"]];
  const get = id => { const [c,k]=id.split("."); return DATA[c][k]; };
  const el = (t,c,h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.textContent=h; return e; };
  // conflict pills
  const cwrap = document.getElementById("conflicts");
  for (const [a,b] of PAIRS) {
    const A=get(a), B=get(b);
    const p = el("span","pair");
    p.append(Object.assign(el("span","dot"),{style:"background:"+A.color}), el("span",null,A.text), el("span",null,"≠"),
             Object.assign(el("span","dot"),{style:"background:"+B.color}), el("span",null,B.text));
    cwrap.append(p);
  }
  // categories
  const cats = document.getElementById("cats");
  for (const c of Object.keys(DATA)) {
    cats.append(el("h2",null,c.replace(/_/g," ")));
    const g = el("div","grid");
    for (const k of Object.keys(DATA[c])) {
      const t = DATA[c][k]; const card = el("div","card");
      const r1 = el("div","row1");
      r1.append(Object.assign(el("span","swatch"),{style:"background:"+t.color}));
      const nm = el("div"); nm.append(Object.assign(el("div","key"),{textContent:t.text}), Object.assign(el("div","zh"),{textContent:t.text_zh}));
      r1.append(nm);
      card.append(r1);
      card.append(Object.assign(el("div","glyphs"),{textContent:"icon: "+t.icon+" · shape: "+t.shape+" · "+t.color}));
      card.append(Object.assign(el("div","meta"),{textContent:t.a11y}));
      card.append(Object.assign(el("div","meta"),{textContent:t.a11y_zh}));
      g.append(card);
    }
    cats.append(g);
  }
</script>
