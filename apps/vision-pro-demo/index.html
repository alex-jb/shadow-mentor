<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Shadow × Apple Vision Pro — banking analyst spatial review</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #05060a; color: #e6e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  #xr-button { position: fixed; bottom: 24px; right: 24px; z-index: 10;
    padding: 14px 22px; border: 1px solid #2a2f3d; background: #11131a;
    color: #e6e8f0; border-radius: 12px; cursor: pointer; font-size: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  #xr-button:hover { background: #1a1d27; border-color: #3a4050; }
  #xr-button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { position: fixed; top: 12px; left: 12px; z-index: 10;
    font-size: 12px; padding: 8px 12px; background: rgba(20,20,30,0.7);
    border-radius: 8px; max-width: 60ch; line-height: 1.4;
    border: 1px solid #2a2f3d; }
  #status .ok { color: #6fdc8c; }
  #status .warn { color: #ffb55a; }
  #status .err { color: #ff6470; }
  #instructions {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    max-width: 34ch; font-size: 11px; line-height: 1.5;
    padding: 10px 14px; background: rgba(20,20,30,0.75);
    border: 1px solid #2a2f3d; border-radius: 8px;
  }
  #instructions h4 { margin: 0 0 6px 0; font-size: 12px; color: #6fdc8c; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="status">Initializing scene…</div>
<div id="instructions">
  <h4>Vision Pro gestures</h4>
  <div>• <b>Gaze</b> at a podium panel to highlight it.</div>
  <div>• <b>Pinch</b> (thumb + index) to submit an override on the currently-gazed voice.</div>
  <div>• <b>Two-hand pinch and pull</b> to reposition the whole council.</div>
  <div style="margin-top:6px; color:#a0a4b0;">Desktop preview: click a panel to simulate gaze.</div>
</div>
<button id="xr-button" disabled>Enter Vision Pro (loading…)</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>

<script type="module">
// ═══════════════════════════════════════════════════════════════════
// Shadow × Apple Vision Pro — banking analyst spatial review
// ═══════════════════════════════════════════════════════════════════
// SCAFFOLD shipped 2026-07-02. Sibling of apps/xreal-demo (2026-06-29)
// targeting the Vision Pro spatial-AR device for the mid-July 2026 Y.U.
// Dean + Vice-Provost demo (double-barrel: XReal + Vision Pro at once)
// and the IEEE VR 2027 paper §4.6 hardware comparison.
//
// Key architectural difference vs XReal
//   XReal uses arc-fan panels + head-mounted display navigated by looking
//   around. Vision Pro's input paradigm is transient-pointer: gaze
//   selects, pinch commits. So the demo has to (a) show a per-panel
//   highlight state driven by ray-hit against gaze cursor, and (b)
//   listen for `select` events (pinch-driven) rather than a keyboard.
//
// What this is
//   - Pure HTML + Three.js + WebXR, no bundler.
//   - Fetches /api/deliberate live (falls back to MOCK_RESPONSE offline).
//   - Renders 5 podium panels in a half-circle arc 1.5 m from origin.
//   - `transient-pointer` input source with ray + hit-test for gaze
//     highlight; `select` event for pinch-commit.
//
// What this is NOT (yet)
//   - No visionOS Enterprise API sideload — this runs in Safari WebXR
//     immersive-vr as a public-visibility demo. Enterprise install
//     (org-signed) lands as separate ship.
//   - No 3D Gaussian Splatting ambient background yet.
//   - No traceability_dict overlay inside the panel — same open work
//     as the XReal sibling.
//   - No hand-tracking beyond pinch-select. Wrist rotation etc. are
//     not yet mapped.
//
// Same code shape as XReal so the two demos stay easy to compare and
// the IEEE §4.6 evaluation can quote them side-by-side.
// ═══════════════════════════════════════════════════════════════════

import * as THREE from "three";

const statusEl = document.getElementById("status");
const xrButton = document.getElementById("xr-button");

function setStatus(html, level = "ok") {
  statusEl.innerHTML = `<span class="${level}">${html}</span>`;
}

// ─── Mock loan packet (same as XReal sibling — mirror shape) ────────
const MOCK_LOAN = {
  fico: 740, dti: 0.28, ltv: 0.72,
  loan_amount_usd: 285000, scenario: "lbo",
  question: "Mid-cap LBO leverage 4.4× — Policy 4.3 applicable?"
};

const MOCK_RESPONSE = {
  voices: [
    { name: "Credit Fundamentals", verdict: "approve",
      rationale: "FICO 740 clears Addendum A floor 700; DTI 0.28 well under 0.36." },
    { name: "Risk Officer", verdict: "escalate",
      rationale: "4.4× leverage at LBO ceiling; recommend Risk Appetite Note check." },
    { name: "Fair Lending Compliance", verdict: "approve",
      rationale: "No disparate-impact flag; protected-class neutral." },
    { name: "Customer Advocate", verdict: "approve",
      rationale: "Repayment capacity sound under compensating factors." },
    { name: "Macro Contrarian", verdict: "escalate",
      rationale: "Sector concentration cap 22% — current allocation 19%." }
  ],
};

const VERDICT_COLOR = {
  approve:  0x6fdc8c,
  escalate: 0xffb55a,
  block:    0xff6470,
};

async function fetchCouncil() {
  try {
    const r = await fetch("/api/deliberate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ scenario: "lbo", loan: MOCK_LOAN }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    setStatus(`✓ Live /api/deliberate (${data.voices?.length ?? 0} voices)`, "ok");
    return data;
  } catch (err) {
    setStatus(`⚠ Backend unreachable (${err.message}) — using mock council`, "warn");
    return MOCK_RESPONSE;
  }
}

// ─── Three.js scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
// Vision Pro seated / analyst-desk baseline is ~1.5 m
camera.position.set(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
keyLight.position.set(2, 4, 2);
scene.add(keyLight);

// ─── Panel builder with gaze-highlight state ────────────────────────
const panelGroups = []; // for raycasting

function makePanel({ name, verdict, rationale, index, total }) {
  const group = new THREE.Group();
  group.userData = { name, verdict, rationale, highlighted: false };

  const arcSpan = (Math.PI * 2) / 3;
  const t = total === 1 ? 0 : index / (total - 1);
  const angle = -arcSpan / 2 + t * arcSpan;
  const radius = 1.5;
  group.position.set(
    Math.sin(angle) * radius,
    1.55,
    -Math.cos(angle) * radius
  );
  group.rotation.y = angle;

  // Plate + highlight ring
  const plate = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 0.6),
    new THREE.MeshBasicMaterial({
      color: 0x11131a, transparent: true, opacity: 0.85, side: THREE.DoubleSide
    })
  );
  group.add(plate);
  group.userData.plate = plate;

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.28, 0.32, 32),
    new THREE.MeshBasicMaterial({
      color: 0x6fdc8c, transparent: true, opacity: 0.0, side: THREE.DoubleSide
    })
  );
  ring.position.set(0, 0, -0.001);
  group.add(ring);
  group.userData.ring = ring;

  const stripe = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 0.04),
    new THREE.MeshBasicMaterial({
      color: VERDICT_COLOR[verdict] ?? 0x888899, side: THREE.DoubleSide
    })
  );
  stripe.position.set(0, 0.28, 0.001);
  group.add(stripe);

  const canvas = document.createElement("canvas");
  canvas.width = 512; canvas.height = 600;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#e6e8f0";
  ctx.font = "bold 30px -apple-system, system-ui";
  ctx.fillText(name, 24, 80);
  ctx.font = "bold 22px -apple-system";
  const verdictColor = verdict === "approve" ? "#6fdc8c"
    : verdict === "escalate" ? "#ffb55a"
    : "#ff6470";
  ctx.fillStyle = verdictColor;
  ctx.fillText(verdict.toUpperCase(), 24, 130);
  ctx.fillStyle = "#a0a4b0";
  ctx.font = "20px -apple-system";
  const words = (rationale || "").split(" ");
  let line = "", y = 190;
  for (const w of words) {
    if ((line + w).length > 36) { ctx.fillText(line, 24, y); line = w + " "; y += 26; }
    else line += w + " ";
  }
  ctx.fillText(line, 24, y);

  const texture = new THREE.CanvasTexture(canvas);
  const textPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(0.45, 0.53),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
  );
  textPlane.position.set(0, -0.01, 0.002);
  group.add(textPlane);

  panelGroups.push(group);
  return group;
}

async function buildScene() {
  const council = await fetchCouncil();
  const voices = council.voices ?? MOCK_RESPONSE.voices;
  for (let i = 0; i < voices.length; i++) {
    const v = voices[i];
    scene.add(makePanel({
      name: v.name,
      verdict: v.verdict ?? "approve",
      rationale: v.rationale ?? "",
      index: i, total: voices.length,
    }));
  }
}

// ─── Gaze ray + pinch commit ────────────────────────────────────────
// Vision Pro exposes `transient-pointer` input source in WebXR immersive
// sessions. When the user gazes at something and pinches, Safari emits a
// `select` event on the corresponding XR input source. We raycast against
// panel groups to compute what was gazed at.

const raycaster = new THREE.Raycaster();
let currentlyGazed = null;

function setPanelHighlight(group, on) {
  if (!group) return;
  if (group.userData.highlighted === on) return;
  group.userData.highlighted = on;
  group.userData.ring.material.opacity = on ? 0.9 : 0.0;
  group.userData.plate.material.opacity = on ? 0.95 : 0.85;
}

function updateGazeFromController(controller) {
  const origin = new THREE.Vector3();
  const direction = new THREE.Vector3(0, 0, -1);
  origin.setFromMatrixPosition(controller.matrixWorld);
  direction.applyMatrix4(new THREE.Matrix4().extractRotation(controller.matrixWorld));
  raycaster.set(origin, direction);
  // Ray hit-test against panel plates
  const hits = [];
  for (const g of panelGroups) {
    const inter = raycaster.intersectObject(g.userData.plate, false);
    if (inter.length) hits.push({ dist: inter[0].distance, group: g });
  }
  hits.sort((a, b) => a.dist - b.dist);
  const nearest = hits[0]?.group ?? null;

  if (nearest !== currentlyGazed) {
    setPanelHighlight(currentlyGazed, false);
    setPanelHighlight(nearest, true);
    currentlyGazed = nearest;
    if (nearest) {
      const label = nearest.userData.name;
      // In-session feedback (visible in the reader's panel or console
      // depending on runtime). Doesn't call the backend; audit trail
      // upgrade lands with the visionOS Enterprise sideload ship.
      console.log(`[vp-demo] gaze locked on ${label}`);
    }
  }
}

function onSelect(event) {
  // Pinch-commit: log an override intent against the gazed voice
  if (!currentlyGazed) return;
  const label = currentlyGazed.userData.name;
  console.log(`[vp-demo] analyst override intent recorded for ${label}`);
  // Visual feedback flash
  const orig = currentlyGazed.userData.ring.material.color.clone();
  currentlyGazed.userData.ring.material.color.setHex(0xffffff);
  setTimeout(() => {
    if (currentlyGazed) currentlyGazed.userData.ring.material.color.copy(orig);
  }, 300);
}

// ─── WebXR session bootstrap ────────────────────────────────────────
let controller0 = null;
let controller1 = null;

function initControllers() {
  controller0 = renderer.xr.getController(0);
  controller1 = renderer.xr.getController(1);
  scene.add(controller0);
  scene.add(controller1);
  controller0.addEventListener("select", onSelect);
  controller1.addEventListener("select", onSelect);
}

if (navigator.xr) {
  navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
    if (supported) {
      xrButton.disabled = false;
      xrButton.textContent = "Enter Vision Pro spatial";
      xrButton.onclick = async () => {
        try {
          const session = await navigator.xr.requestSession("immersive-vr", {
            optionalFeatures: ["local-floor", "hand-tracking", "layers"],
          });
          renderer.xr.setSession(session);
          initControllers();
          xrButton.textContent = "In spatial mode";
          xrButton.disabled = true;
        } catch (err) {
          setStatus(`✗ XR session refused: ${err.message}`, "err");
        }
      };
    } else {
      xrButton.textContent = "Spatial unavailable (need Safari WebXR / Vision Pro)";
      xrButton.disabled = true;
    }
  });
} else {
  xrButton.textContent = "WebXR not supported";
  xrButton.disabled = true;
}

// Desktop preview: click on canvas to simulate gaze selection
window.addEventListener("click", (e) => {
  if (renderer.xr.isPresenting) return; // in XR, gaze handles this
  const rect = renderer.domElement.getBoundingClientRect();
  const ndc = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hits = [];
  for (const g of panelGroups) {
    const inter = raycaster.intersectObject(g.userData.plate, false);
    if (inter.length) hits.push({ dist: inter[0].distance, group: g });
  }
  hits.sort((a, b) => a.dist - b.dist);
  const nearest = hits[0]?.group ?? null;
  if (nearest !== currentlyGazed) {
    setPanelHighlight(currentlyGazed, false);
    setPanelHighlight(nearest, true);
    currentlyGazed = nearest;
  }
});

// ─── Render loop ────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  if (renderer.xr.isPresenting) {
    // In XR — use controller 0's transient-pointer ray for gaze target
    if (controller0) updateGazeFromController(controller0);
  }

  // Subtle breathing on all panels
  const t = performance.now() * 0.0006;
  for (const g of panelGroups) {
    const s = 1 + Math.sin(t + g.position.x) * 0.02;
    g.scale.set(s, s, s);
  }
  renderer.render(scene, camera);
});

buildScene();
</script>
</body>
</html>
